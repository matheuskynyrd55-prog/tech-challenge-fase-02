services:
  db:
    image: postgres:16-alpine
    container_name: trabalho2_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trabalho2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: trabalho2_api
    depends_on:
      - db
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/trabalho2?schema=public
    ports:
      - "3000:3000"

volumes:
  postgres_data:
